name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────
  # 1. Backend — lint + unit tests
  # ─────────────────────────────────────────
  backend:
    name: Backend (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['20', '22']

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: plxyground
          POSTGRES_PASSWORD: plxyground
          POSTGRES_DB: plxyground_test
        ports:
          - 5432:5432
        options: >
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://plxyground:plxyground@localhost:5432/plxyground_test
      JWT_SECRET: ci-test-secret-must-be-at-least-32-chars!!
      ADMIN_JWT_SECRET: ci-admin-secret-must-be-at-least-32-chars
      NODE_ENV: test
      PORT: 3001

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        working-directory: backend
        run: npm ci

      - name: Lint
        working-directory: backend
        run: npm run lint --if-present

      - name: Run migrations
        working-directory: backend
        run: node src/db/migrate.js

      - name: Run tests
        working-directory: backend
        run: npm test -- --forceExit --detectOpenHandles

  # ─────────────────────────────────────────
  # 2. Frontend — JS type-check + lint
  # ─────────────────────────────────────────
  frontend:
    name: Frontend (Expo)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint --if-present

      - name: Expo doctor
        working-directory: frontend
        run: npx expo-doctor@latest --fix-dependencies || true

  # ─────────────────────────────────────────
  # 3. Admin panel — syntax check
  # ─────────────────────────────────────────
  admin:
    name: Admin Panel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: admin-panel/package-lock.json

      - name: Install deps
        working-directory: admin-panel
        run: npm ci

      - name: Syntax check server.js
        working-directory: admin-panel
        run: node --check server.js
