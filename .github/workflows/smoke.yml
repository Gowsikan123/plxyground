name: Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Backend Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: plxyground_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Start backend server
        working-directory: backend
        env:
          PORT: 3011
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/plxyground_test
          JWT_SECRET: ci_test_secret_key_at_least_32_characters_long
          JWT_EXPIRES_IN: 7d
          CORS_ORIGIN: http://localhost:3000
          NODE_ENV: test
        run: |
          node src/index.js &
          echo $! > /tmp/server.pid
          sleep 4

      - name: Wait for server to be ready
        run: |
          for i in {1..15}; do
            if curl -sf http://localhost:3011/healthz > /dev/null 2>&1; then
              echo "Server is ready"
              break
            fi
            echo "Waiting for server... attempt $i"
            sleep 2
          done

      - name: Run smoke tests
        working-directory: backend
        env:
          API_BASE_URL: http://localhost:3011
        run: node src/scripts/smoke.js

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill $(cat /tmp/server.pid) || true
          fi
