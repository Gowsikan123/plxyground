name: Smoke Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: plxyground
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run backend smoke suite
        working-directory: backend
        env:
          NODE_ENV: test
          PORT: 3011
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/plxyground
          JWT_SECRET: github_actions_test_secret_minimum_32_characters_long
          JWT_EXPIRES_IN: 7d
          CORS_ORIGIN: http://localhost:19006,http://localhost:3012
        run: npm run smoke
