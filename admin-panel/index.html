<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PLXYGROUND Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           #0a0a0a;
      --surface:      #111111;
      --surface-2:    #181818;
      --surface-3:    #1f1f1f;
      --border:       rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.13);
      --text:         #e8e8e8;
      --text-muted:   #888;
      --text-faint:   #444;
      --primary:      #3b82f6;
      --primary-hover:#2563eb;
      --success:      #22c55e;
      --warning:      #f59e0b;
      --error:        #ef4444;
      --radius-sm:    6px;
      --radius-md:    10px;
      --radius-lg:    14px;
      --font-body:    'Inter', sans-serif;
      --font-mono:    'JetBrains Mono', monospace;
      --sidebar-w:    220px;
      --header-h:     56px;
      --transition:   150ms cubic-bezier(0.16,1,0.3,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
    body { font-family: var(--font-body); font-size: 14px; color: var(--text); background: var(--bg); min-height: 100dvh; }
    button { cursor: pointer; font: inherit; border: none; background: none; color: inherit; }
    input, textarea, select { font: inherit; color: inherit; background: none; border: none; outline: none; }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    table { border-collapse: collapse; width: 100%; }
    :focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; border-radius: var(--radius-sm); }
    .sr-only { position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; }

    /* ─── LAYOUT ─────────────────────────────────────────── */
    #app { display: flex; min-height: 100dvh; }
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100dvh; background: var(--bg); }
    #main-layout { display: flex; flex: 1; width: 100%; }

    /* ─── SIDEBAR ────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w); min-height: 100dvh; background: var(--surface);
      border-right: 1px solid var(--border); display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; z-index: 100;
    }
    .sidebar-logo {
      padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .sidebar-logo svg { flex-shrink: 0; }
    .sidebar-logo-text { font-size: 15px; font-weight: 700; letter-spacing: 0.04em; color: var(--text); }
    .sidebar-logo-badge { font-size: 9px; font-weight: 600; background: var(--primary); color: #fff; padding: 1px 5px; border-radius: 3px; letter-spacing: 0.06em; margin-top: 1px; }
    .sidebar-nav { flex: 1; padding: 10px 10px; display: flex; flex-direction: column; gap: 2px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 8px 10px;
      border-radius: var(--radius-sm); font-size: 13px; font-weight: 500;
      color: var(--text-muted); cursor: pointer;
      transition: background var(--transition), color var(--transition);
    }
    .nav-item:hover { background: var(--surface-2); color: var(--text); }
    .nav-item.active { background: rgba(59,130,246,0.12); color: var(--primary); }
    .nav-item svg { opacity: 0.7; flex-shrink: 0; }
    .nav-item.active svg { opacity: 1; }
    .nav-badge {
      margin-left: auto; font-size: 10px; font-weight: 700; min-width: 18px; height: 18px;
      background: var(--error); color: #fff; border-radius: 9px; display: flex;
      align-items: center; justify-content: center; padding: 0 5px;
    }
    .sidebar-footer { padding: 12px 10px; border-top: 1px solid var(--border); }
    .admin-chip {
      display: flex; align-items: center; gap: 8px; padding: 8px 10px;
      border-radius: var(--radius-sm); background: var(--surface-2);
    }
    .admin-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--primary); display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .admin-name { font-size: 12px; font-weight: 600; color: var(--text); }
    .admin-role { font-size: 10px; color: var(--text-muted); }
    .btn-logout {
      margin-left: auto; padding: 4px 8px; border-radius: var(--radius-sm);
      font-size: 11px; color: var(--text-muted); background: var(--surface-3);
      transition: background var(--transition), color var(--transition);
    }
    .btn-logout:hover { background: rgba(239,68,68,0.12); color: var(--error); }

    /* ─── MAIN CONTENT ───────────────────────────────────── */
    .main-content {
      margin-left: var(--sidebar-w); flex: 1; min-height: 100dvh;
      display: flex; flex-direction: column;
    }
    .topbar {
      height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 24px; gap: 12px; position: sticky; top: 0; z-index: 50;
    }
    .topbar-title { font-size: 15px; font-weight: 600; color: var(--text); }
    .topbar-sub { font-size: 12px; color: var(--text-muted); margin-left: 2px; }
    .topbar-spacer { flex: 1; }
    .page-body { flex: 1; padding: 24px; max-width: 1300px; width: 100%; }

    /* ─── CARDS ──────────────────────────────────────────── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 20px;
    }
    .card-sm { padding: 14px 16px; }

    /* ─── KPI GRID ───────────────────────────────────────── */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .kpi-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
      padding: 16px 18px;
    }
    .kpi-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
    .kpi-value { font-size: 28px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; line-height: 1; }
    .kpi-sub { font-size: 11px; color: var(--text-muted); margin-top: 5px; }
    .kpi-warn .kpi-value { color: var(--warning); }
    .kpi-err .kpi-value { color: var(--error); }
    .kpi-ok .kpi-value { color: var(--success); }

    /* ─── TABLE ──────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; border-radius: var(--radius-lg); border: 1px solid var(--border); }
    .data-table { width: 100%; }
    .data-table th {
      font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--text-muted); padding: 10px 14px; text-align: left;
      background: var(--surface-2); border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    .data-table td { padding: 11px 14px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--surface-2); }
    .data-table .mono { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }

    /* ─── BADGES ─────────────────────────────────────────── */
    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .badge-success { background: rgba(34,197,94,0.12); color: var(--success); }
    .badge-warning { background: rgba(245,158,11,0.12); color: var(--warning); }
    .badge-error   { background: rgba(239,68,68,0.12);  color: var(--error); }
    .badge-info    { background: rgba(59,130,246,0.12);  color: var(--primary); }
    .badge-neutral { background: var(--surface-3); color: var(--text-muted); }

    /* ─── BUTTONS ────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px;
      border-radius: var(--radius-sm); font-size: 13px; font-weight: 500;
      transition: background var(--transition), color var(--transition), opacity var(--transition);
      white-space: nowrap;
    }
    .btn:disabled { opacity: 0.45; pointer-events: none; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-ghost { background: transparent; color: var(--text-muted); }
    .btn-ghost:hover { background: var(--surface-2); color: var(--text); }
    .btn-danger { background: rgba(239,68,68,0.1); color: var(--error); }
    .btn-danger:hover { background: rgba(239,68,68,0.2); }
    .btn-success { background: rgba(34,197,94,0.1); color: var(--success); }
    .btn-success:hover { background: rgba(34,197,94,0.2); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    /* ─── INPUTS ─────────────────────────────────────────── */
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 5px; }
    .inp {
      width: 100%; padding: 9px 12px; background: var(--surface-3);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      font-size: 13px; color: var(--text);
      transition: border-color var(--transition);
    }
    .inp:focus { border-color: var(--primary); }
    .inp.error-inp { border-color: var(--error); }
    .inp-row { display: flex; gap: 8px; }
    .inp-row .inp { flex: 1; }

    /* ─── LOGIN ──────────────────────────────────────────── */
    .login-box { width: 100%; max-width: 380px; }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo-mark {
      display: inline-flex; align-items: center; justify-content: center;
      width: 52px; height: 52px; border-radius: 14px;
      background: var(--primary); margin-bottom: 14px;
    }
    .login-title { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .login-sub { font-size: 13px; color: var(--text-muted); }
    .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 28px; }
    .login-error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 12px; color: var(--error); margin-bottom: 14px; display: none; }
    .login-error.show { display: block; }

    /* ─── TOAST ──────────────────────────────────────────── */
    #toast-container { position: fixed; top: 18px; right: 18px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
    .toast {
      padding: 11px 16px; border-radius: var(--radius-md); font-size: 13px; font-weight: 500;
      max-width: 320px; pointer-events: all; animation: toastIn 0.2s ease;
    }
    @keyframes toastIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
    .toast-success { background: #14532d; color: #bbf7d0; border: 1px solid #166534; }
    .toast-error   { background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; }
    .toast-info    { background: #1e3a5f; color: #93c5fd; border: 1px solid #1d4ed8; }

    /* ─── MODALS ─────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 500;
      display: flex; align-items: center; justify-content: center; padding: 20px;
      opacity: 0; pointer-events: none; transition: opacity var(--transition);
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
      padding: 24px; width: 100%; max-width: 480px;
      transform: scale(0.97); transition: transform var(--transition);
    }
    .modal-overlay.open .modal { transform: scale(1); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .modal-title { font-size: 15px; font-weight: 600; }
    .modal-close { padding: 4px; border-radius: var(--radius-sm); color: var(--text-muted); }
    .modal-close:hover { background: var(--surface-2); color: var(--text); }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

    /* ─── FILTERS ROW ────────────────────────────────────── */
    .filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .filter-select {
      padding: 7px 10px; background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); font-size: 12px; color: var(--text-muted);
      cursor: pointer; transition: border-color var(--transition);
    }
    .filter-select:focus { border-color: var(--primary); color: var(--text); }
    .filter-search {
      padding: 7px 12px; background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); font-size: 12px; color: var(--text);
      min-width: 200px; transition: border-color var(--transition);
    }
    .filter-search:focus { border-color: var(--primary); }
    .filter-search::placeholder { color: var(--text-faint); }
    .spacer { flex: 1; }

    /* ─── BULK BAR ───────────────────────────────────────── */
    .bulk-bar {
      display: none; align-items: center; gap: 10px; padding: 10px 16px;
      background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.2);
      border-radius: var(--radius-md); margin-bottom: 14px; font-size: 13px;
    }
    .bulk-bar.show { display: flex; }
    .bulk-count { font-weight: 600; color: var(--primary); }

    /* ─── EMPTY STATE ────────────────────────────────────── */
    .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-icon { font-size: 36px; margin-bottom: 12px; }
    .empty h3 { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .empty p { font-size: 13px; }

    /* ─── PAGINATION ─────────────────────────────────────── */
    .pagination { display: flex; align-items: center; justify-content: flex-end; gap: 6px; margin-top: 16px; }
    .page-btn { padding: 5px 10px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 500; background: var(--surface-2); color: var(--text-muted); transition: background var(--transition), color var(--transition); }
    .page-btn:hover { background: var(--surface-3); color: var(--text); }
    .page-btn.active { background: var(--primary); color: #fff; }
    .page-info { font-size: 12px; color: var(--text-muted); }

    /* ─── SECTION HEADER ─────────────────────────────────── */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .section-title { font-size: 15px; font-weight: 600; color: var(--text); }
    .section-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ─── CONTENT PREVIEW ───────────────────────────────── */
    .content-body-preview { font-size: 12px; color: var(--text-muted); max-width: 320px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

    /* ─── AUDIT LOG ──────────────────────────────────────── */
    .audit-meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); max-width: 260px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

    /* ─── TABS ───────────────────────────────────────────── */
    .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .tab-btn { padding: 8px 14px; font-size: 13px; font-weight: 500; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; cursor: pointer; transition: color var(--transition), border-color var(--transition); }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* ─── LOADING SPINNER ────────────────────────────────── */
    .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.6s linear infinite; margin: 40px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="app"></div>
<div id="toast-container"></div>

<div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title"></span>
      <button class="modal-close" onclick="closeModal()" aria-label="Close">&times;</button>
    </div>
    <div id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
const API = 'http://localhost:3001/api';
const state = {
  token: sessionStorage.getItem('plxy_admin_token') || null,
  admin: JSON.parse(sessionStorage.getItem('plxy_admin') || 'null'),
  page: 'dashboard',
  queuePage: 1, usersPage: 1, contentPage: 1, auditPage: 1,
  selectedQueueIds: new Set(),
  queueFilter: 'pending',
  usersTab: 'creator',
  usersSearch: '',
  contentStatus: '',
  auditFilter: '',
  analytics: null,
};

// ─── API HELPER ──────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', ...(state.token ? { Authorization: `Bearer ${state.token}` } : {}) },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  const data = await res.json();
  if (res.status === 401) { logout(); return null; }
  return { ok: res.ok, status: res.status, data };
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(title, bodyHtml, footerHtml) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal-footer').innerHTML = footerHtml || '';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
document.getElementById('modal-overlay').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal(); });

// ─── AUTH ─────────────────────────────────────────────────────────────────────
function logout() {
  state.token = null; state.admin = null;
  sessionStorage.removeItem('plxy_admin_token');
  sessionStorage.removeItem('plxy_admin');
  render();
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  btn.disabled = true; btn.textContent = 'Signing in…';
  errEl.classList.remove('show');

  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;

  const res = await api('POST', '/admin/auth/login', { email, password });
  btn.disabled = false; btn.textContent = 'Sign in';

  if (!res || !res.ok) {
    errEl.textContent = res?.data?.error || 'Login failed. Check your credentials.';
    errEl.classList.add('show');
    return;
  }

  state.token = res.data.token;
  state.admin = res.data.admin;
  sessionStorage.setItem('plxy_admin_token', state.token);
  sessionStorage.setItem('plxy_admin', JSON.stringify(state.admin));
  render();
  loadDashboard();
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
function navigate(page) {
  state.page = page;
  renderMain();
  const loaders = { dashboard: loadDashboard, queue: loadQueue, users: loadUsers, content: loadAdminContent, audit: loadAudit };
  loaders[page]?.();
}

// ─── RENDER ROOT ─────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (!state.token) { app.innerHTML = renderLogin(); return; }
  app.innerHTML = `
    <div id="main-layout">
      ${renderSidebar()}
      <div class="main-content">
        <div class="topbar" id="topbar"></div>
        <div class="page-body" id="page-body"></div>
      </div>
    </div>`;
  renderMain();
}

// ─── LOGIN PAGE ───────────────────────────────────────────────────────────────
function renderLogin() {
  return `<div id="login-screen" style="display:flex;align-items:center;justify-content:center;min-height:100dvh;">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-mark">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect x="4" y="4" width="9" height="9" rx="2" fill="white" opacity="0.9"/><rect x="15" y="4" width="9" height="9" rx="2" fill="white" opacity="0.5"/><rect x="4" y="15" width="9" height="9" rx="2" fill="white" opacity="0.5"/><rect x="15" y="15" width="9" height="9" rx="2" fill="white" opacity="0.2"/></svg>
      </div>
      <div class="login-title">PLXYGROUND</div>
      <div class="login-sub">Admin Panel — sign in to continue</div>
    </div>
    <div class="login-card">
      <div class="login-error" id="login-error"></div>
      <form onsubmit="handleLogin(event)">
        <div class="field"><label for="login-email">Email address</label><input id="login-email" class="inp" type="email" placeholder="admin@plxyground.io" autocomplete="email" required /></div>
        <div class="field"><label for="login-password">Password</label><input id="login-password" class="inp" type="password" placeholder="••••••••" autocomplete="current-password" required /></div>
        <button id="login-btn" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:6px;" type="submit">Sign in</button>
      </form>
    </div>
  </div>
</div>`;
}

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
const NAV = [
  { id:'dashboard', label:'Dashboard',  icon:'<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>' },
  { id:'queue',     label:'Mod Queue',   icon:'<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>', badge: true },

// ─── MOD QUEUE ────────────────────────────────────────────────────────────────
async function loadQueue() {
  const res = await api('GET', `/admin/queue?status=${state.queueFilter}&page=${state.queuePage}&limit=20`);
  if (!res?.ok) return;
  const items = res.data.queue;
  state.selectedQueueIds.clear();

  document.getElementById('page-body').innerHTML = `
  <div class="filters">
    <select class="filter-select" onchange="state.queueFilter=this.value;state.queuePage=1;loadQueue()">
      <option value="pending" ${state.queueFilter==='pending'?'selected':''}>Pending</option>
      <option value="approved" ${state.queueFilter==='approved'?'selected':''}>Approved</option>
      <option value="rejected" ${state.queueFilter==='rejected'?'selected':''}>Rejected</option>
    </select>
    <span class="spacer"></span>
    ${state.queueFilter === 'pending' && items.length ? `<button class="btn btn-sm btn-ghost" onclick="selectAllQueue()">Select all</button>` : ''}
  </div>
  <div id="bulk-bar" class="bulk-bar">
    <span class="bulk-count" id="bulk-count">0 selected</span>
    <button class="btn btn-sm btn-success" onclick="bulkAction('approve')">✓ Approve all</button>
    <button class="btn btn-sm btn-danger" onclick="bulkAction('reject')">✗ Reject all</button>
  </div>
  ${items.length === 0 ? `<div class="empty"><div class="empty-icon">${state.queueFilter==='pending'?'✅':'📋'}</div><h3>${state.queueFilter==='pending'?'Queue is clear!':'No items here'}</h3><p>${state.queueFilter==='pending'?'All content has been reviewed.':'Adjust the filter above.'}</p></div>` : `
  <div class="table-wrap">
  <table class="data-table">
    <thead><tr>
      ${state.queueFilter === 'pending' ? '<th style="width:36px"><input type="checkbox" id="queue-check-all" onchange="toggleAllQueue(this.checked)" /></th>' : ''}
      <th>Content</th><th>Creator</th><th>Sport</th><th>Tags</th><th>Submitted</th>
      ${state.queueFilter === 'pending' ? '<th>Actions</th>' : '<th>Status</th>'}
    </tr></thead>
    <tbody id="queue-tbody">
      ${items.map(item => `<tr id="qrow-${item.id}">
        ${state.queueFilter === 'pending' ? `<td><input type="checkbox" class="queue-cb" value="${item.id}" onchange="toggleQueueItem(${item.id}, this.checked)" /></td>` : ''}
        <td>
          <div style="font-weight:500;font-size:13px;max-width:240px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${esc(item.title)}</div>
          <div class="content-body-preview">${esc(item.body || '—')}</div>
        </td>
        <td><span style="font-size:13px">${esc(item.display_name || item.username)}</span><br><span class="mono">@${esc(item.username)}</span></td>
        <td>${item.sport ? `<span class="badge badge-info">${esc(item.sport)}</span>` : '—'}</td>
        <td>${(item.tags||[]).map(t=>`<span class="badge badge-neutral">${esc(t)}</span>`).join(' ') || '—'}</td>
        <td class="mono">${fmtDate(item.created_at)}</td>
        ${state.queueFilter === 'pending' ? `<td style="white-space:nowrap">
          <button class="btn btn-sm btn-success" onclick="moderateItem(${item.id},'approve')">✓ Approve</button>
          <button class="btn btn-sm btn-danger" onclick="moderateItem(${item.id},'reject')">✗ Reject</button>
        </td>` : `<td><span class="badge ${item.status==='approved'?'badge-success':'badge-error'}">${item.status}</span></td>`}
      </tr>`).join('')}
    </tbody>
  </table></div>`}
  `;
}

function toggleQueueItem(id, checked) {
  checked ? state.selectedQueueIds.add(id) : state.selectedQueueIds.delete(id);
  const bar = document.getElementById('bulk-bar');
  const count = document.getElementById('bulk-count');
  if (bar) { bar.classList.toggle('show', state.selectedQueueIds.size > 0); }
  if (count) count.textContent = `${state.selectedQueueIds.size} selected`;
}

function toggleAllQueue(checked) {
  document.querySelectorAll('.queue-cb').forEach(cb => { cb.checked = checked; toggleQueueItem(parseInt(cb.value), checked); });
}

function selectAllQueue() {
  const allCb = document.getElementById('queue-check-all');
  if (allCb) { allCb.checked = true; toggleAllQueue(true); }
}

async function moderateItem(queueId, action) {
  const row = document.getElementById(`qrow-${queueId}`);
  const res = await api('PATCH', `/admin/queue/${queueId}`, { action });
  if (!res?.ok) { toast(res?.data?.error || 'Action failed', 'error'); return; }
  toast(`Post ${action}d successfully`, 'success');
  if (row) row.remove();
  if (state.analytics) { state.analytics.pendingQueue = Math.max(0, state.analytics.pendingQueue - 1); document.querySelector('.sidebar')?.remove(); document.getElementById('main-layout').insertAdjacentHTML('afterbegin', renderSidebar()); }
}

async function bulkAction(action) {
  const ids = [...state.selectedQueueIds];
  if (!ids.length) return;
  const res = await api('POST', '/admin/queue/bulk', { ids, action });
  if (!res?.ok) { toast(res?.data?.error || 'Bulk action failed', 'error'); return; }
  toast(`${res.data.processed} post(s) ${action}d`, 'success');
  state.selectedQueueIds.clear();
  loadQueue();
}

      <option value="approved" ${state.contentStatus==='approved'?'selected':''}>Approved</option>
      <option value="pending" ${state.contentStatus==='pending'?'selected':''}>Pending</option>
      <option value="rejected" ${state.contentStatus==='rejected'?'selected':''}>Rejected</option>
    </select>
  </div>
  ${items.length === 0 ? `<div class="empty"><div class="empty-icon">📭</div><h3>No content found</h3><p>Try a different filter.</p></div>` : `
  <div class="table-wrap"><table class="data-table">
    <thead><tr><th>Title</th><th>Creator</th><th>Sport</th><th>Status</th><th>Flagged</th><th>Views</th><th>Created</th><th>Actions</th></tr></thead>
    <tbody>
      ${items.map(c => `<tr>
        <td><div style="max-width:220px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-weight:500">${esc(c.title)}</div></td>
        <td><span style="font-size:12px">@${esc(c.username)}</span></td>
        <td>${c.sport ? `<span class="badge badge-info">${esc(c.sport)}</span>` : '—'}</td>
        <td><span class="badge ${c.status==='approved'?'badge-success':c.status==='pending'?'badge-warning':'badge-error'}">${c.status}</span></td>
        <td>${c.is_flagged ? '<span class="badge badge-error">⚠ Flagged</span>' : '<span class="badge badge-neutral">Clean</span>'}</td>
        <td class="mono">${c.view_count}</td>
        <td class="mono">${fmtDate(c.created_at)}</td>
        <td style="white-space:nowrap">
          ${c.is_flagged ? `<button class="btn btn-sm btn-ghost" onclick="flagContent(${c.id},false)">Unflag</button>` : `<button class="btn btn-sm btn-ghost" onclick="flagContent(${c.id},true)">Flag</button>`}
          <button class="btn btn-sm btn-danger" onclick="deleteContent(${c.id})">Delete</button>
        </td>
      </tr>`).join('')}
    </tbody>
  </table></div>`}`;

async function flagContent(id, flagged) {
  const res = await api('PATCH', `/admin/content/${id}/flag`, { flagged });
  if (res?.ok) { toast(flagged ? 'Content flagged' : 'Flag removed', 'success'); loadAdminContent(); }
  else toast(res?.data?.error || 'Failed', 'error');
}

async function deleteContent(id) {
  openModal('Delete content', '<p style="font-size:13px;color:var(--text-muted)">Are you sure you want to permanently delete this post? This cannot be undone.</p>',
    `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="confirmDeleteContent(${id})">Delete permanently</button>`);
}

async function confirmDeleteContent(id) {
  closeModal();
  const res = await api('DELETE', `/admin/content/${id}`);
  if (res?.ok) { toast('Post deleted', 'success'); loadAdminContent(); }
  else toast(res?.data?.error || 'Failed', 'error');
}

  else toast(res?.data?.error || 'Failed', 'error');
}

        <td><code style="font-family:var(--font-mono);font-size:11px;color:var(--text)">${esc(e.action)}</code></td>
        <td class="mono">${e.target_type ? `${esc(e.target_type)} #${e.target_id}` : '—'}</td>
        <td class="mono">${esc(e.ip_address||'—')}</td>
        <td><span class="audit-meta">${JSON.stringify(e.metadata) !== '{}' ? esc(JSON.stringify(e.metadata)) : '—'}</span></td>
      </tr>`).join('')}
    </tbody>
  </table></div>`}
  <div class="pagination">
    ${state.auditPage > 1 ? `<button class="page-btn" onclick="state.auditPage--;loadAudit()">← Prev</button>` : ''}
    <span class="page-info">Page ${state.auditPage}</span>
    ${log.length === 50 ? `<button class="page-btn" onclick="state.auditPage++;loadAudit()">Next →</button>` : ''}
  </div>`;
}

function exportAuditLog() {
  api('GET', `/admin/audit?limit=200&page=1${state.auditFilter?'&actor_type='+state.auditFilter:''}`).then(res => {
    if (!res?.ok) return;
    const blob = new Blob([JSON.stringify(res.data.log, null, 2)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `plxy-audit-${Date.now()}.json`; a.click();
    toast('Audit log exported', 'success');
  });
}

// ─── SETTINGS ─────────────────────────────────────────────────────────────────
function loadSettings() {
  document.getElementById('page-body').innerHTML = `
  <div style="max-width:480px">
    <div class="card" style="margin-bottom:16px">
      <div class="section-header"><div class="section-title">Account</div></div>
      <div style="display:flex;align-items:center;gap:12px;padding:4px 0">
        <div class="admin-avatar" style="width:44px;height:44px;font-size:15px">${(state.admin?.username||'A').slice(0,2).toUpperCase()}</div>
        <div>
          <div style="font-weight:600">${esc(state.admin?.username||'')}</div>
          <div style="font-size:12px;color:var(--text-muted)">${esc(state.admin?.email||'')} &bull; ${esc(state.admin?.role||'')}</div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="section-header"><div class="section-title">Change Password</div></div>
      <div id="pwd-msg"></div>
      <form onsubmit="handleChangePwd(event)">
        <div class="field"><label>Current password</label><input class="inp" id="pwd-current" type="password" required /></div>
        <div class="field"><label>New password</label><input class="inp" id="pwd-new" type="password" minlength="8" required /></div>
        <div class="field"><label>Confirm new password</label><input class="inp" id="pwd-confirm" type="password" minlength="8" required /></div>
        <button class="btn btn-primary" type="submit">Update password</button>
      </form>
    </div>
  </div>`;
}

async function handleChangePwd(e) {
  e.preventDefault();
  const current = document.getElementById('pwd-current').value;
  const newPwd = document.getElementById('pwd-new').value;
  const confirm = document.getElementById('pwd-confirm').value;
  const msg = document.getElementById('pwd-msg');
  if (newPwd !== confirm) { msg.innerHTML = '<div style="color:var(--error);font-size:12px;margin-bottom:12px">Passwords do not match</div>'; return; }
  const res = await api('PATCH', '/admin/auth/password', { current_password: current, new_password: newPwd });
  if (res?.ok) { toast('Password updated successfully', 'success'); e.target.reset(); msg.innerHTML = ''; }
  else { msg.innerHTML = `<div style="color:var(--error);font-size:12px;margin-bottom:12px">${esc(res?.data?.error||'Failed to update password')}</div>`; }
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function esc(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(d) { return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
function fmtDateFull(d) { return new Date(d).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}); }

// override navigate for settings which has no async loader
const _origNavigate = navigate;
window.navigate = function(page) {
  state.page = page;
  renderMain();
  if (page === 'settings') { loadSettings(); return; }
  const loaders = { dashboard: loadDashboard, queue: loadQueue, users: loadUsers, content: loadAdminContent, audit: loadAudit };
  loaders[page]?.();
};

// ─── BOOT ─────────────────────────────────────────────────────────────────────
render();
if (state.token) loadDashboard();
</script>
</body>
</html>
